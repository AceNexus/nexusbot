server:
  port: ${SERVER_PORT:5001}
  shutdown: graceful

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local-eureka}
  application:
    name: nexusbot
  lifecycle:
    timeout-per-shutdown-phase: 30s

# ==========================================
# 日誌設定
# ==========================================
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%-5level) [%clr(%t){faint}] [%clr(%X{traceId:-}){magenta}] [%clr(%X{spanId:-}){blue}] [%clr(%logger){cyan}] %m%n%wEx"
  level:
    root: INFO
    com.acenexus.tata.nexusbot: INFO
    com.linecorp.bot.client.wire: WARN
    okhttp3: WARN

# ==========================================
# Actuator
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,busrefresh
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}   # 預設關閉；Docker 部署在 .env 設 1.0 開啟
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://tempo:4318/v1/traces}
